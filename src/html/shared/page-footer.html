<!-- START: Footer -->
<!--
    Additional Classes:
        .nk-footer-parallax
        .nk-footer-parallax-opacity
-->
<footer class="nk-footer{{ ' nk-footer-parallax' if footer_parallax }}{{ ' nk-footer-parallax-opacity' if footer_parallax_opacity }}">
    <img class="nk-footer-top-corner" src="assets/images/footer-corner.png" alt="">

    {% if footer_bg %}
    <div class="bg-image">
        <img src="{{ footer_bg }}" alt="" class="jarallax-img">
    </div>
    {% endif %}

    <div class="container">
        <div class="nk-gap-2"></div>
        <!-- <div class="nk-footer-logos">
            <a href="https://nkdev.info/" target="_blank"><img class="nk-img" src="assets/images/footer-logo-godlike.png" alt="" width="120"></a>
            <a href="https://nkdev.info/" target="_blank"><img class="nk-img" src="assets/images/footer-logo-yp3.png" alt="" width="120"></a>
            <a href="https://nkdev.info/" target="_blank"><img class="nk-img" src="assets/images/footer-logo-nk-team.png" alt="" width="150"></a>
            <a href="https://nkdev.info/" target="_blank"><img class="nk-img" src="assets/images/footer-logo-pegi-18.png" alt="" width="46"></a>
            <a href="https://nkdev.info/" target="_blank"><img class="nk-img" src="assets/images/footer-logo-18-restricted.png" alt="" width="160"></a>
        </div>
        <div class="nk-gap"></div> -->

        <div class="nk-footer-links">
            <a href="page-terms-conditions-ar.html" class="link-effect terms-link-ar">الشروط والأحكام</a>
            <a href="page-terms-conditions-en.html" class="link-effect terms-link-en" style="display:none;">Terms and Conditions</a>
        </div>

        <script>
        // Show correct Terms link based on language
        (function(){
            function updateTermsLink() {
                var lang = localStorage.getItem('siteLang') || 'ar';
                var arLink = document.querySelector('.terms-link-ar');
                var enLink = document.querySelector('.terms-link-en');
                
                if (arLink && enLink) {
                    if (lang === 'en') {
                        arLink.style.display = 'none';
                        enLink.style.display = 'inline';
                    } else {
                        arLink.style.display = 'inline';
                        enLink.style.display = 'none';
                    }
                }
            }
            
            // Update on page load
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', updateTermsLink);
            } else {
                updateTermsLink();
            }
            
            // Update when language changes
            window.addEventListener('languageChanged', updateTermsLink);
            if (window.jQuery) {
                window.jQuery(window).on('languageChanged', updateTermsLink);
            }
        })();
        </script>

        <div class="nk-gap-4"></div>
    </div>
</footer>
<!-- END: Footer -->
